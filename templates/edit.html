{% extends "base.html" %}

{% block title %}{{ 'Create New' if not post else 'Edit' }} Post{% endblock %}

{% block content %}
    <div class="form-container">
        <h1>{{ 'Create New' if not post else 'Edit' }} Post</h1>
        
        <form method="POST" class="post-form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" required 
                       value="{{ post.title if post else '' }}"
                       placeholder="Post title...">
            </div>
            
            <div class="form-group">
                <label for="content">Content</label>
                <textarea id="content" name="content" required 
                          placeholder="Write your post here...">{{ post.content if post else '' }}</textarea>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('blog.index') }}" class="btn btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn btn-primary">
                    {{ 'Publish' if not post else 'Update' }}
                </button>
            </div>
        </form>
    </div>
{% endblock %}
